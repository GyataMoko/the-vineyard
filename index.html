
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>J vs M Challenge</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root{--bg:#0f172a;--card:#1e293b;--j:#16a34a;--m:#C8B7C9;--text:#e2e8f0}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,Segoe UI,sans-serif;background:radial-gradient(circle at top,rgba(59,130,246,.2),transparent 28%),linear-gradient(135deg,#0b1120,#101827);color:var(--text);padding:24px;min-height:100vh}
.container{max-width:60%;width:60%;margin:0 auto;display:flex;flex-direction:column;align-items:center;gap:24px}
.card{background:rgba(15,23,42,.82);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.08);box-shadow:0 30px 80px rgba(0,0,0,.25);border-radius:24px;padding:28px;margin-bottom:24px;width:100%}
.center-card{width:100%;margin:0 auto;text-align:center}
.grid{display:grid;grid-template-columns:repeat(2,minmax(250px,1fr));gap:20px;margin-bottom:24px;width:100%}
.score{padding:28px;border-radius:24px;text-align:center;background:rgba(15,23,42,.72);border:1px solid rgba(255,255,255,.08);box-shadow:inset 0 0 0 1px rgba(255,255,255,.04)}
.j{background:linear-gradient(135deg,#16a34a,#1f7a1c)}
.m{background:linear-gradient(135deg,#C8B7C9,#DDD1DE);color:#1e293b}
.m h1,.m h2,.m h3,.m p{color:#1e293b}
input,select,button{width:100%;padding:14px;border-radius:14px;border:1px solid rgba(148,163,184,.25);background:rgba(15,23,42,.95);color:#fff;transition:all .2s ease}
input:focus,select:focus,button:focus{outline:none;box-shadow:0 0 0 3px rgba(59,130,246,.18);border-color:rgba(59,130,246,.5)}
.form-grid{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:18px;align-items:end;margin-bottom:24px}
.form-grid > div{display:flex;flex-direction:column;align-items:center;gap:10px}
.form-grid label{display:block;text-align:center;font-size:.95rem;color:#94a3b8;font-weight:600}
button{background:#2563eb;border:none;cursor:pointer;padding:12px 16px;font-size:13px;font-weight:700;color:#fff;letter-spacing:.02em;transition:background .2s ease,transform .2s ease}
button:hover{background:#1d4ed8;transform:translateY(-1px)}
.table-wrapper button{width:auto;margin:0 4px}
.danger{background:#dc2626}
.edit{background:#3b82f6}
.card h3,.card p{text-align:center}
#projectedWinner{text-align:center;margin-top:12px;font-weight:600}
.chart-tabs{display:flex;justify-content:center;gap:8px;margin-bottom:18px}
.chart-tabs button{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:#e2e8f0;padding:10px 16px;border-radius:9999px;cursor:pointer;transition:all .2s ease}
.chart-tabs button.active{background:rgba(59,130,246,.95);border-color:rgba(59,130,246,.8);color:#fff}
.chart-wrapper{display:none}
.chart-wrapper.active{display:block}
@media(min-width:769px){.chart-tabs{display:none}.chart-wrapper{display:block}}
.progress{height:20px;background:#334155;border-radius:99px;overflow:hidden;margin:16px 0}
.bar{height:100%;background:#16a34a;transition:width .3s ease,background-color .3s ease}
.score-value-animate{animation:score-pop .35s ease forwards}
.leader-glow{animation:leader-glow .7s ease forwards}
@keyframes score-pop{0%{transform:scale(1)}50%{transform:scale(1.18)}100%{transform:scale(1)}}
@keyframes leader-glow{0%{box-shadow:0 0 0 rgba(255,255,255,0)}50%{box-shadow:0 0 18px rgba(255,255,255,0.45)}100%{box-shadow:0 0 0 rgba(255,255,255,0)}}
canvas{background:rgba(15,23,42,.95);border:1px solid rgba(148,163,184,.16);border-radius:18px;padding:12px;height:400px!important;width:100%!important;box-shadow:inset 0 0 0 1px rgba(255,255,255,.03)}
table{width:100%;border-collapse:collapse}
th,td{padding:12px;border-bottom:1px solid rgba(148,163,184,.16);text-align:center}
.table-wrapper{overflow:auto}
.card-list{display:none}
.entry-card{background:rgba(15,23,42,.72);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:20px;margin-bottom:18px;box-shadow:0 20px 50px rgba(0,0,0,.12)}
.entry-card__header{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px}
.entry-card__player{font-size:1.1rem;font-weight:700}
.entry-card__date{font-size:.95rem;color:#94a3b8}
.entry-card__body{display:grid;gap:10px}
.entry-card__row{display:flex;justify-content:space-between;gap:10px}
.entry-card__label{color:#94a3b8}
.entry-card__actions{display:flex;justify-content:flex-end;gap:10px;margin-top:14px}
.entry-card button{flex:1}
@media(max-width:768px){.container{width:95%;max-width:95%;gap:18px}.grid,.form-grid{grid-template-columns:1fr}.form-grid{gap:14px}.form-grid > div{align-items:stretch}.table-wrapper{display:none}.card-list{display:block}.card{padding:20px;margin-bottom:18px}.entry-card{padding:16px;margin-bottom:16px}.entry-card__player{font-size:1rem}.entry-card__date{font-size:.9rem}.form-grid label{font-size:.9rem}button{font-size:12px;padding:12px 14px}}
@media(min-width:769px){#pointsWrapper,#weightWrapper{display:block}.chart-wrapper{display:block}}
</style>
</head>
<body>
<div class='container'>
<h1>🏆 J vs M Challenge</h1>
<div class='card center-card'><h3 id='leaderboard'>Leaderboard</h3><p id='weightSummary'></p><p id='projectedWinner'></p></div>
<div class='card'><h3>Challenge Progress</h3><div class='progress'><div id='progressBar' class='bar'></div></div><p id='progressText'></p></div>
<div class='card'><div class='form-grid'><div><label>Date</label><input type='date' id='date' onclick='this.showPicker&&this.showPicker()' onfocus='this.showPicker&&this.showPicker()'></div><div><label>Competitor</label><select id='competitor'><option>J</option><option>M</option></select></div><div><label>Snacks</label><input type='number' id='snacks'></div><div><label>Water (L)</label><input type='number' id='water'></div><div><label>Steps</label><input type='number' id='steps'></div><div><label>Weight (kg)</label><input type='number' id='weight' step='0.1'></div></div><button onclick='addEntry()'>Add Result</button></div>
<div class='grid'><div class='score j'><h3>J Total</h3><h1 id='jTotal'>0</h1><p id='jAvg'>Avg: 0.0 pts/day</p><p id='jWeightChange'>↕ 0.0 kg</p></div><div class='score m'><h3>M Total</h3><h1 id='mTotal'>0</h1><p id='mAvg'>Avg: 0.0 pts/day</p><p id='mWeightChange'>↕ 0.0 kg</p></div></div>
<div class='card'>
  <div class='chart-tabs'>
    <button id='pointsTab' class='active' type='button' onclick="showChart('points')">Points Progress</button>
    <button id='weightTab' type='button' onclick="showChart('weight')">Weight</button>
  </div>
  <div class='chart-wrapper active' id='pointsWrapper'><canvas id='pointsChart'></canvas></div>
  <div class='chart-wrapper' id='weightWrapper'><canvas id='weightChart'></canvas></div>
</div>
<div class='card table-wrapper'><table><thead><tr><th>Date</th><th>Player</th><th>Snacks</th><th>Water</th><th>Steps</th><th>Weight</th><th>Points</th><th>Actions</th></tr></thead><tbody id='entryTable'></tbody></table></div>
<div id='entryCards' class='card-list'></div>
</div>
<script>
let entries=JSON.parse(localStorage.getItem('competitionData')||'[]');
let pointsChart,weightChart;
let selectedChart = localStorage.getItem('selectedChart') || 'points';
if (!['points','weight'].includes(selectedChart)) selectedChart = 'points';
const start=new Date('2026-06-22');
const end=new Date('2026-09-14');
const today = new Date();
const isoToday = today.toISOString().split('T')[0];
if (!date.value) date.value = isoToday;
function save(){localStorage.setItem('competitionData',JSON.stringify(entries))}
function calculatePoints(s,w,st){return (s===0?2:0)-(s||0)+(w||0)+Math.floor((st||0)/5000)}
function formatDate(value){const d=new Date(value);return isNaN(d)?value:d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}
function addEntry(){const e={date:date.value,competitor:competitor.value,snacks:+(snacks.value||0),water:+(water.value||0),steps:+(steps.value||0),weight:weight.value?+weight.value:null};if(!e.date)return;e.points=calculatePoints(e.snacks,e.water,e.steps);entries.push(e);save();render();date.value=isoToday}
function del(i){entries.splice(i,1);save();render()}
function edit(i){const e=entries[i];date.value=e.date;competitor.value=e.competitor;snacks.value=e.snacks;water.value=e.water;steps.value=e.steps;weight.value=e.weight||'';del(i)}
function opts(type){return{responsive:true,maintainAspectRatio:false,plugins:{tooltip:{backgroundColor:'#1e293b',titleColor:'#fff',bodyColor:'#fff'},legend:{position:window.innerWidth<768?'bottom':'top',labels:{color:'#e2e8f0',boxWidth:12}}},scales:{x:{ticks:{color:'#e2e8f0',maxRotation:45,minRotation:45},grid:{color:'#334155'}},y:{title:{display:true,text:type==='weight'?'Weight (kg)':'Points'},ticks:{color:'#e2e8f0'},grid:{color:'#334155'}}}}}
function initCharts(){const pointsCtx=document.getElementById('pointsChart');const weightCtx=document.getElementById('weightChart');pointsChart=new Chart(pointsCtx,{type:'line',data:{labels:[],datasets:[{label:'J Total Points',data:[],borderColor:'#16a34a',tension:.3},{label:'M Total Points',data:[],borderColor:'#C8B7C9',tension:.3}]},options:opts('points')});weightChart=new Chart(weightCtx,{type:'line',data:{labels:[],datasets:[{label:'J Weight',data:[],borderColor:'#16a34a',tension:.3},{label:'M Weight',data:[],borderColor:'#C8B7C9',tension:.3}]},options:opts('weight')})}
function showChart(type){selectedChart = type==='weight'?'weight':'points';localStorage.setItem('selectedChart',selectedChart);document.getElementById('pointsWrapper').classList.toggle('active', selectedChart==='points');document.getElementById('weightWrapper').classList.toggle('active', selectedChart==='weight');document.getElementById('pointsTab').classList.toggle('active', selectedChart==='points');document.getElementById('weightTab').classList.toggle('active', selectedChart==='weight')}
function render(){entries.sort((a,b)=>a.date.localeCompare(b.date));let j=0,m=0,jr=0,mr=0,l=[],jp=[],mp=[];entryTable.innerHTML='';entryCards.innerHTML='';entries.forEach((e,i)=>{if(e.competitor==='J'){j+=e.points;jr+=e.points}else{m+=e.points;mr+=e.points}l.push(e.date);jp.push(jr);mp.push(mr);entryTable.innerHTML+=`<tr><td>${e.date}</td><td>${e.competitor}</td><td>${e.snacks}</td><td>${e.water}</td><td>${e.steps}</td><td>${e.weight??''}</td><td>${e.points}</td><td><button class='edit' onclick='edit(${i})'>Edit</button><button class='danger' onclick='del(${i})'>Delete</button></td></tr>`;entryCards.innerHTML+=`<div class='entry-card'><div class='entry-card__header'><span class='entry-card__player'>${e.competitor}</span><span class='entry-card__date'>${formatDate(e.date)}</span></div><div class='entry-card__body'><div class='entry-card__row'><span class='entry-card__label'>Steps:</span><strong>${e.steps.toLocaleString()}</strong></div><div class='entry-card__row'><span class='entry-card__label'>Weight:</span><strong>${e.weight!=null?e.weight.toFixed(1):'—'}</strong></div><div class='entry-card__row'><span class='entry-card__label'>Points:</span><strong>${e.points}</strong></div></div><div class='entry-card__actions'><button class='edit' onclick='edit(${i})'>Edit</button><button class='danger' onclick='del(${i})'>Delete</button></div></div>`});const previousJ = Number(jTotal.textContent)||0;const previousM = Number(mTotal.textContent)||0;jTotal.textContent=j;mTotal.textContent=m;const days=Math.max(1,Math.ceil((Math.min(new Date(),end)-start)/(1000*60*60*24)));jAvg.textContent=`Avg: ${(j/days).toFixed(1)} pts/day`;mAvg.textContent=`Avg: ${(m/days).toFixed(1)} pts/day`;const jTotalEl = document.getElementById('jTotal');const mTotalEl = document.getElementById('mTotal');if(j !== previousJ){jTotalEl.classList.remove('score-value-animate');void jTotalEl.offsetWidth;jTotalEl.classList.add('score-value-animate')}if(m !== previousM){mTotalEl.classList.remove('score-value-animate');void mTotalEl.offsetWidth;mTotalEl.classList.add('score-value-animate')}if(j===m){leaderboard.textContent='Tied';leaderboard.style.color='#e2e8f0';leaderboard.classList.remove('leader-glow')}else if(j>m){leaderboard.textContent=`J leads by ${j-m} points`;leaderboard.style.color='#16a34a';leaderboard.style.textShadow='0 0 10px #16a34a, 0 0 20px #16a34a';leaderboard.classList.remove('leader-glow');leaderboard.classList.add('leader-glow')}else{leaderboard.textContent=`M leads by ${m-j} points`;leaderboard.style.color='#C8B7C9';leaderboard.style.textShadow='0 0 10px #C8B7C9, 0 0 20px #C8B7C9';leaderboard.classList.remove('leader-glow');leaderboard.classList.add('leader-glow')}const jw=entries.filter(x=>x.competitor==='J'&&x.weight!=null);const mw=entries.filter(x=>x.competitor==='M'&&x.weight!=null);const jWeightDiff=jw.length>1?jw.at(-1).weight-jw[0].weight:0;const mWeightDiff=mw.length>1?mw.at(-1).weight-mw[0].weight:0;jWeightChange.textContent=`↕ ${jWeightDiff>0?'+':''}${jWeightDiff.toFixed(1)} kg`;mWeightChange.textContent=`↕ ${mWeightDiff>0?'+':''}${mWeightDiff.toFixed(1)} kg`;weightSummary.textContent=`J ${jWeightDiff<0?'lost':'gained'} ${Math.abs(jWeightDiff).toFixed(1)}kg • M ${mWeightDiff<0?'lost':'gained'} ${Math.abs(mWeightDiff).toFixed(1)}kg`;
    const remainingDays = Math.max(0, Math.ceil((end - new Date())/(1000*60*60*24)));
    const jProjected = j + remainingDays * (j/days);
    const mProjected = m + remainingDays * (m/days);
    if(jProjected === mProjected){projectedWinner.textContent = 'Projected Winner: Tie'} else if(jProjected > mProjected){projectedWinner.textContent = `Projected Winner: J by ${Math.round(jProjected-mProjected)} points`} else {projectedWinner.textContent = `Projected Winner: M by ${Math.round(mProjected-jProjected)} points`};
    const pct=Math.max(0,Math.min(100,((new Date()-start)/(end-start))*100));progressBar.style.width=pct+'%';if(pct<40){progressBar.style.backgroundColor='#3b82f6'}else if(pct<70){progressBar.style.backgroundColor='#8b5cf6'}else{progressBar.style.backgroundColor='#f59e0b'};progressText.textContent=`${remainingDays} day${remainingDays===1?'':'s'} remaining • ${Math.round(pct)}% complete`;
    pointsChart.data.labels = l;
    pointsChart.data.datasets[0].data = jp;
    pointsChart.data.datasets[1].data = mp;
    pointsChart.options = opts('points');
    pointsChart.update();
    const weightLabels=[...new Set([...jw.map(x=>x.date),...mw.map(x=>x.date)])];
    weightChart.data.labels = weightLabels;
    weightChart.data.datasets[0].data = jw.map(x=>x.weight);
    weightChart.data.datasets[1].data = mw.map(x=>x.weight);
    weightChart.options = opts('weight');
    weightChart.update();
    showChart(selectedChart)}
initCharts();
render();
</script>
</body>
</html>
